<body>

    <!-- WebGL Container -->
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, carouselGroup, particles;
        
        // Interaction & Setup State
        let isDragging = false;
        let previousX = 0; let previousY = 0;
        let targetRotationY = 0; let targetRotationX = 0;
        let currentRotationY = 0; let currentRotationX = 0;

        // User Settings State
        let baseRotationSpeed = 0.0015;
        let targetCameraZ = 12;
        let currentCameraZ = 12;
        let spacingMultiplier = 1.0;
        let loadedItemsCount = 9; // Default to 9 placeholders

        // Zoom boundaries
        let initialPinchDistance = null;
        let minCameraZ = 5;
        let maxCameraZ = 50;

        window.onload = function() {
            init();
            setupInteractions();
            setupSettingsControls();
            setupFileUpload();
            animate();
        };

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0f172a, 0.02); 

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, currentCameraZ);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            carouselGroup = new THREE.Group();
            scene.add(carouselGroup);

            createPlaceholders(loadedItemsCount);
            createParticles();

            window.addEventListener('resize', onWindowResize, false);
        }

        // Generate dynamic canvas textures for placeholders
        function createPlaceholderTexture(index, total) {
            const canvas = document.createElement('canvas');
            canvas.width = 800; canvas.height = 600;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, `hsl(${(index / total) * 360}, 70%, 30%)`);
            gradient.addColorStop(1, `hsl(${(index / total) * 360 + 40}, 80%, 15%)`);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 10;
            ctx.strokeRect(5, 5, canvas.width - 10, canvas.height - 10);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.font = 'bold 80px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(`Awaiting Photo ${index + 1}`, canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.font = '30px sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fillText('Click "Load Your Photos"', canvas.width / 2, canvas.height / 2 + 50);

            return new THREE.CanvasTexture(canvas);
        }

        // Recalculates all positions dynamically based on the current items and spacing setting
        function updateCarouselLayout() {
            // Divide by 2 because each photo consists of a frame + plane
            const count = Math.floor(carouselGroup.children.length / 2); 
            if (count === 0) return;

            // Calculate base radius ensuring enough room, then apply user multiplier
            const baseRadius = Math.max(6, (count * 5.5) / (2 * Math.PI));
            const activeRadius = baseRadius * spacingMultiplier;

            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                
                // Get frame and plane objects
                const frame = carouselGroup.children[i * 2];
                const plane = carouselGroup.children[i * 2 + 1];
                
                const posX = Math.sin(angle) * activeRadius;
                const posZ = Math.cos(angle) * activeRadius;
                
                // Position the front plane
                plane.position.set(posX, 0, posZ);
                plane.rotation.y = angle;
                
                // Position the backing frame slightly behind it
                frame.position.copy(plane.position);
                frame.rotation.copy(plane.rotation);
                frame.translateZ(-0.02); 
            }
        }

        function createPlaceholders(count) {
            clearCarousel();
            for (let i = 0; i < count; i++) {
                const texture = createPlaceholderTexture(i, count);
                addPanelToCarousel(texture, 4, 3);
            }
            updateCarouselLayout();
        }

        function clearCarousel() {
            while(carouselGroup.children.length > 0) {
                const child = carouselGroup.children[0];
                carouselGroup.remove(child);
                if(child.material.map) child.material.map.dispose();
                child.material.dispose();
                child.geometry.dispose();
            }
        }

        function addPanelToCarousel(texture, width, height) {
            const geometry = new THREE.PlaneGeometry(width, height);
            const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
            const plane = new THREE.Mesh(geometry, material);

            const frameGeo = new THREE.PlaneGeometry(width + 0.2, height + 0.2);
            const frameMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
            const frame = new THREE.Mesh(frameGeo, frameMat);

            // Add as a pair: frame first, then plane (so math works)
            carouselGroup.add(frame);
            carouselGroup.add(plane);
        }

        function createParticles() {
            const particleCount = 800;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            
            for(let i = 0; i < particleCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 40;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 32, 32);
            
            const material = new THREE.PointsMaterial({
                color: 0x38bdf8,
                size: 0.15,
                map: new THREE.CanvasTexture(canvas),
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        // Update Slider UI from JavaScript Logic
        function syncZoomUI() {
            const slider = document.getElementById('zoomSlider');
            const valDisplay = document.getElementById('zoomVal');
            slider.value = targetCameraZ;
            valDisplay.innerText = targetCameraZ.toFixed(1);
        }

        function setupSettingsControls() {
            const speedSlider = document.getElementById('speedSlider');
            const zoomSlider = document.getElementById('zoomSlider');
            const spaceSlider = document.getElementById('spaceSlider');
            
            const speedVal = document.getElementById('speedVal');
            const zoomVal = document.getElementById('zoomVal');
            const spaceVal = document.getElementById('spaceVal');

            speedSlider.addEventListener('input', (e) => {
                baseRotationSpeed = parseFloat(e.target.value);
                const display = (baseRotationSpeed / 0.0015).toFixed(1);
                speedVal.innerText = `${display}x`;
            });

            zoomSlider.addEventListener('input', (e) => {
                targetCameraZ = parseFloat(e.target.value);
                zoomVal.innerText = targetCameraZ.toFixed(1);
            });

            spaceSlider.addEventListener('input', (e) => {
                spacingMultiplier = parseFloat(e.target.value);
                spaceVal.innerText = `${spacingMultiplier.toFixed(1)}x`;
                updateCarouselLayout(); 
            });
        }

        function setupInteractions() {
            const container = document.getElementById('canvas-container');

            const getPinchDistance = (e) => Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );

            const onPointerDown = (e) => {
                // Ignore clicks on buttons/sliders
                if (e.target.tagName.toLowerCase() === 'input' || e.target.closest('.ui-layer')) return;

                if (e.touches && e.touches.length === 2) {
                    isDragging = false;
                    initialPinchDistance = getPinchDistance(e);
                    return;
                }
                
                isDragging = true;
                previousX = e.touches ? e.touches[0].pageX : e.clientX;
                previousY = e.touches ? e.touches[0].pageY : e.clientY;
                container.style.cursor = 'grabbing';
            };

            const onPointerMove = (e) => {
                if (e.touches && e.touches.length === 2 && initialPinchDistance !== null) {
                    const currentPinchDistance = getPinchDistance(e);
                    const pinchDelta = initialPinchDistance - currentPinchDistance;
                    
                    targetCameraZ += pinchDelta * 0.05;
                    targetCameraZ = Math.max(minCameraZ, Math.min(maxCameraZ, targetCameraZ));
                    syncZoomUI();
                    
                    initialPinchDistance = currentPinchDistance;
                    return;
                }

                if (!isDragging) return;
                
                const currentX = e.touches ? e.touches[0].pageX : e.clientX;
                const currentY = e.touches ? e.touches[0].pageY : e.clientY;
                
                targetRotationY += (currentX - previousX) * 0.005;
                targetRotationX += (currentY - previousY) * 0.002;
                targetRotationX = Math.max(-0.3, Math.min(0.3, targetRotationX));

                previousX = currentX; previousY = currentY;
            };

            const onPointerUp = (e) => {
                if (e && e.touches && e.touches.length < 2) {
                    initialPinchDistance = null;
                }
                isDragging = false;
                container.style.cursor = 'grab';
            };

            container.addEventListener('mousedown', onPointerDown);
            window.addEventListener('mousemove', onPointerMove);
            window.addEventListener('mouseup', onPointerUp);
            
            container.addEventListener('wheel', (e) => {
                targetCameraZ += e.deltaY * 0.02;
                targetCameraZ = Math.max(minCameraZ, Math.min(maxCameraZ, targetCameraZ));
                syncZoomUI();
            }, { passive: true });
            
            container.addEventListener('touchstart', onPointerDown, { passive: true });
            window.addEventListener('touchmove', onPointerMove, { passive: true });
            window.addEventListener('touchend', onPointerUp);
            container.style.cursor = 'grab';
        }

        function setupFileUpload() {
            const input = document.getElementById('fileInput');
            
            input.addEventListener('change', (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                clearCarousel();
                
                // Allow uploading the exact same files again if requested
                input.value = ""; 

                files.forEach((file) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const texture = new THREE.Texture(img);
                            texture.needsUpdate = true;
                            texture.minFilter = THREE.LinearFilter; 
                            
                            const aspect = img.width / img.height;
                            let height = 3.5;
                            let width = height * aspect;
                            
                            if (width > 6) { width = 6; height = width / aspect; }

                            // Add the loaded image into the 3D space
                            addPanelToCarousel(texture, width, height);
                            
                            // Re-calculate the layout radius immediately for every new photo
                            updateCarouselLayout();
                            
                            // Auto-adjust camera so we don't end up inside the expanding ring
                            const count = Math.floor(carouselGroup.children.length / 2);
                            const baseRadius = Math.max(6, (count * 5.5) / (2 * Math.PI));
                            targetCameraZ = Math.max(12, (baseRadius * spacingMultiplier) + 8);
                            syncZoomUI();
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isDragging && initialPinchDistance === null) {
                targetRotationY += baseRotationSpeed;
            }

            currentRotationY += (targetRotationY - currentRotationY) * 0.1;
            currentRotationX += (targetRotationX - currentRotationX) * 0.1;

            carouselGroup.rotation.y = currentRotationY;
            carouselGroup.rotation.x = currentRotationX;

            currentCameraZ += (targetCameraZ - currentCameraZ) * 0.1;
            camera.position.z = currentCameraZ;

            if (particles) {
                particles.rotation.y += 0.0005;
                particles.rotation.x += 0.0002;
            }

            carouselGroup.position.y = Math.sin(Date.now() * 0.001) * 0.2;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
