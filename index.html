    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, carouselGroup, particles;
        let isDragging = false, previousX = 0, previousY = 0;
        let targetRotationY = 0, targetRotationX = 0, currentRotationY = 0, currentRotationX = 0;
        let baseRotationSpeed = 0.0015, targetCameraZ = 12, currentCameraZ = 12, spacingMultiplier = 1.0;
        let loadedItemsCount = 9, initialPinchDistance = null, minCameraZ = 5, maxCameraZ = 50;

        window.onload = function() {
            init();
            setupInteractions();
            setupSettingsControls();
            setupFileUpload();
            animate();
        };

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0f172a, 0.02); 

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, currentCameraZ);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            carouselGroup = new THREE.Group();
            scene.add(carouselGroup);

            createPlaceholders(loadedItemsCount);
            createParticles();

            window.addEventListener('resize', onWindowResize, false);
        }

        function createPlaceholderTexture(index, total) {
            const canvas = document.createElement('canvas');
            canvas.width = 800; canvas.height = 600;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, `hsl(${(index / total) * 360}, 70%, 30%)`);
            gradient.addColorStop(1, `hsl(${(index / total) * 360 + 40}, 80%, 15%)`);
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; ctx.lineWidth = 10; ctx.strokeRect(5, 5, canvas.width - 10, canvas.height - 10);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; ctx.font = 'bold 80px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(`Awaiting Photo ${index + 1}`, canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = '30px sans-serif'; ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fillText('Click "Load Your Photos"', canvas.width / 2, canvas.height / 2 + 50);
            return new THREE.CanvasTexture(canvas);
        }

        function updateCarouselLayout() {
            const count = Math.floor(carouselGroup.children.length / 2); 
            if (count === 0) return;
            const baseRadius = Math.max(6, (count * 5.5) / (2 * Math.PI));
            const activeRadius = baseRadius * spacingMultiplier;

            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const frame = carouselGroup.children[i * 2];
                const plane = carouselGroup.children[i * 2 + 1];
                
                plane.position.set(Math.sin(angle) * activeRadius, 0, Math.cos(angle) * activeRadius);
                plane.rotation.y = angle;
                frame.position.copy(plane.position);
                frame.rotation.copy(plane.rotation);
                frame.translateZ(-0.02); 
            }
        }

        function createPlaceholders(count) {
            clearCarousel();
            for (let i = 0; i < count; i++) {
                addPanelToCarousel(createPlaceholderTexture(i, count), 4, 3);
            }
            updateCarouselLayout();
        }

        function clearCarousel() {
            while(carouselGroup.children.length > 0) {
                const child = carouselGroup.children[0];
                carouselGroup.remove(child);
                if(child.material.map) child.material.map.dispose();
                child.material.dispose();
                child.geometry.dispose();
            }
        }

        function addPanelToCarousel(texture, width, height) {
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(width, height), new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide }));
            const frame = new THREE.Mesh(new THREE.PlaneGeometry(width + 0.2, height + 0.2), new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide }));
            carouselGroup.add(frame); carouselGroup.add(plane);
        }

        function createParticles() {
            const particleCount = 800; const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for(let i = 0; i < particleCount * 3; i++) positions[i] = (Math.random() - 0.5) * 40;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const canvas = document.createElement('canvas'); canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            grad.addColorStop(0, 'rgba(255,255,255,1)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 32, 32);
            particles = new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0x38bdf8, size: 0.15, map: new THREE.CanvasTexture(canvas), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
            scene.add(particles);
        }

        function syncZoomUI() {
            document.getElementById('zoomSlider').value = targetCameraZ;
            document.getElementById('zoomVal').innerText = targetCameraZ.toFixed(1);
        }

        function setupSettingsControls() {
            document.getElementById('speedSlider').addEventListener('input', (e) => {
                baseRotationSpeed = parseFloat(e.target.value);
                document.getElementById('speedVal').innerText = `${(baseRotationSpeed / 0.0015).toFixed(1)}x`;
            });
            document.getElementById('zoomSlider').addEventListener('input', (e) => {
                targetCameraZ = parseFloat(e.target.value);
                document.getElementById('zoomVal').innerText = targetCameraZ.toFixed(1);
            });
            document.getElementById('spaceSlider').addEventListener('input', (e) => {
                spacingMultiplier = parseFloat(e.target.value);
                document.getElementById('spaceVal').innerText = `${spacingMultiplier.toFixed(1)}x`;
                updateCarouselLayout(); 
            });
        }

        function setupInteractions() {
            const container = document.getElementById('canvas-container');
            const getPinchDistance = (e) => Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);

            const onPointerDown = (e) => {
                if (e.target.tagName.toLowerCase() === 'input' || e.target.closest('.ui-layer')) return;
                if (e.touches && e.touches.length === 2) { isDragging = false; initialPinchDistance = getPinchDistance(e); return; }
                isDragging = true;
                previousX = e.touches ? e.touches[0].pageX : e.clientX;
                previousY = e.touches ? e.touches[0].pageY : e.clientY;
                container.style.cursor = 'grabbing';
            };

            const onPointerMove = (e) => {
                if (e.touches && e.touches.length === 2 && initialPinchDistance !== null) {
                    const pinchDelta = initialPinchDistance - getPinchDistance(e);
                    targetCameraZ = Math.max(minCameraZ, Math.min(maxCameraZ, targetCameraZ + pinchDelta * 0.05));
                    syncZoomUI(); initialPinchDistance = getPinchDistance(e); return;
                }
                if (!isDragging) return;
                const currentX = e.touches ? e.touches[0].pageX : e.clientX;
                const currentY = e.touches ? e.touches[0].pageY : e.clientY;
                targetRotationY += (currentX - previousX) * 0.005;
                targetRotationX = Math.max(-0.3, Math.min(0.3, targetRotationX + (currentY - previousY) * 0.002));
                previousX = currentX; previousY = currentY;
            };

            const onPointerUp = (e) => {
                if (e && e.touches && e.touches.length < 2) initialPinchDistance = null;
                isDragging = false; container.style.cursor = 'grab';
            };

            container.addEventListener('mousedown', onPointerDown); window.addEventListener('mousemove', onPointerMove); window.addEventListener('mouseup', onPointerUp);
            container.addEventListener('wheel', (e) => { targetCameraZ = Math.max(minCameraZ, Math.min(maxCameraZ, targetCameraZ + e.deltaY * 0.02)); syncZoomUI(); }, { passive: true });
            container.addEventListener('touchstart', onPointerDown, { passive: true }); window.addEventListener('touchmove', onPointerMove, { passive: true }); window.addEventListener('touchend', onPointerUp);
            container.style.cursor = 'grab';
        }

        function setupFileUpload() {
            const input = document.getElementById('fileInput');
            const btnText = document.getElementById('btn-text');
            
            input.addEventListener('change', (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                btnText.innerText = `Loading ${files.length} Photos...`;
                clearCarousel();
                let loadedCount = 0;

                files.forEach((file) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            // Calculate 3D display aspect ratio
                            const aspect = img.width / img.height;
                            let displayHeight = 3.5, displayWidth = displayHeight * aspect;
                            if (displayWidth > 6) { displayWidth = 6; displayHeight = displayWidth / aspect; }

                            // FIX: Resize the image via Canvas to prevent iPad WebGL Memory Crashes
                            const MAX_SIZE = 1024;
                            let texWidth = img.width, texHeight = img.height;
                            if (texWidth > MAX_SIZE || texHeight > MAX_SIZE) {
                                const ratio = Math.min(MAX_SIZE / texWidth, MAX_SIZE / texHeight);
                                texWidth *= ratio; texHeight *= ratio;
                            }

                            const canvas = document.createElement('canvas');
                            canvas.width = texWidth; canvas.height = texHeight;
                            canvas.getContext('2d').drawImage(img, 0, 0, texWidth, texHeight);

                            const texture = new THREE.CanvasTexture(canvas);
                            texture.minFilter = THREE.LinearFilter; 
                            
                            addPanelToCarousel(texture, displayWidth, displayHeight);
                            updateCarouselLayout();
                            
                            const count = Math.floor(carouselGroup.children.length / 2);
                            const baseRadius = Math.max(6, (count * 5.5) / (2 * Math.PI));
                            targetCameraZ = Math.max(12, (baseRadius * spacingMultiplier) + 8);
                            syncZoomUI();

                            loadedCount++;
                            if(loadedCount === files.length) {
                                btnText.innerText = "Load Your Photos";
                                input.value = ""; // Safe to reset here after fully loading
                            }
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            });
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

        function animate() {
            requestAnimationFrame(animate);
            if (!isDragging && initialPinchDistance === null) targetRotationY += baseRotationSpeed;
            currentRotationY += (targetRotationY - currentRotationY) * 0.1;
            currentRotationX += (targetRotationX - currentRotationX) * 0.1;
            carouselGroup.rotation.y = currentRotationY; carouselGroup.rotation.x = currentRotationX;
            currentCameraZ += (targetCameraZ - currentCameraZ) * 0.1; camera.position.z = currentCameraZ;
            if (particles) { particles.rotation.y += 0.0005; particles.rotation.x += 0.0002; }
            carouselGroup.position.y = Math.sin(Date.now() * 0.001) * 0.2;
            renderer.render(scene, camera);
        }
    </script>
